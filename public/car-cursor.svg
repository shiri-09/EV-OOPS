<svg xmlns="http://www.w3.org/2000/svg" width="40" height="24" viewBox="0 0 40 24">
  <!-- EV Car body -->
  <path d="M6 14 L8 8 L14 5 L30 5 L35 8 L37 14 Z" fill="#10B981" opacity="0.9"/>
