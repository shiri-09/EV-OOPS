  <!-- Car bottom -->
  <rect x="4" y="14" width="34" height="4" rx="2" fill="#0D9668"/>
  <!-- Lightning bolt (EV symbol) -->
  <path d="M19 6 L17 10 L20 10 L18 14 L23 9 L20 9 L22 6 Z" fill="#FFD700" opacity="0.9"/>
  <!-- Wheels -->
  <circle cx="12" cy="18" r="3" fill="#1a1a2e" stroke="#2DD4BF" stroke-width="0.8"/>
  <circle cx="12" cy="18" r="1.2" fill="#2DD4BF"/>
  <circle cx="30" cy="18" r="3" fill="#1a1a2e" stroke="#2DD4BF" stroke-width="0.8"/>
  <circle cx="30" cy="18" r="1.2" fill="#2DD4BF"/>
  <!-- Headlights -->
  <ellipse cx="37" cy="12" rx="1.5" ry="1" fill="#FFD700" opacity="0.8"/>
  <!-- Tail light -->
  <ellipse cx="5" cy="12" rx="1" ry="1" fill="#EF4444" opacity="0.7"/>
